<div class="form-container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Edit Student' : 'Add New Student' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="studentForm" (ngSubmit)="onSubmit()" class="student-form">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" placeholder="Ex. John Doe">
          <mat-error *ngIf="studentForm.get('name')?.hasError('required')">Name is required</mat-error>
          <mat-error *ngIf="studentForm.get('name')?.hasError('minlength')">Name must be at least 2 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Age</mat-label>
          <input matInput type="number" formControlName="age" placeholder="Ex. 20">
          <mat-error *ngIf="studentForm.get('age')?.hasError('required')">Age is required</mat-error>
          <mat-error *ngIf="studentForm.get('age')?.hasError('min')">Age must be a positive number</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Course</mat-label>
          <input matInput formControlName="course" placeholder="Ex. Computer Science">
          <mat-error *ngIf="studentForm.get('course')?.hasError('required')">Course is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="Ex. john@example.com">
          <mat-error *ngIf="studentForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="studentForm.get('email')?.hasError('email')">Please enter a valid email address</mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="studentForm.invalid">
            {{ isEditMode ? 'Update' : 'Save' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
