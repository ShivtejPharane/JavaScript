<div class="list-container">
  <div class="header-actions">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search Students</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. John" #input>
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button mat-raised-button color="primary" routerLink="/add" class="add-button">
      <mat-icon>add</mat-icon> Add Student
    </button>
  </div>

  <div class="table-container mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" class="student-table">
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Age Column -->
      <ng-container matColumnDef="age">
        <th mat-header-cell *matHeaderCellDef> Age </th>
        <td mat-cell *matCellDef="let element"> {{element.age}} </td>
      </ng-container>

      <!-- Course Column -->
      <ng-container matColumnDef="course">
        <th mat-header-cell *matHeaderCellDef> Course </th>
        <td mat-cell *matCellDef="let element"> {{element.course}} </td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let element"> {{element.email}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="action-column"> Actions </th>
        <td mat-cell *matCellDef="let element" class="action-column">
          <button mat-icon-button color="accent" [routerLink]="['/edit', element.id]" matTooltip="Edit Student">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteStudent(element)" matTooltip="Delete Student">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="student-row"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" colspan="6">
          <mat-icon>inbox</mat-icon>
          <p *ngIf="input.value; else noData">No students match the search "{{input.value}}"</p>
          <ng-template #noData>
            <p>No students found. Add one to get started!</p>
            <button mat-stroked-button color="primary" routerLink="/add">Add Student</button>
          </ng-template>
        </td>
      </tr>
    </table>
  </div>
</div>
